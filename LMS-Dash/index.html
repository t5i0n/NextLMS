<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LMS Dashboard - Instructor View</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Modular CSS -->
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/components/sidebar.css" />
    <link rel="stylesheet" href="assets/css/components/cards.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/layouts/dashboard.css" />
    <link rel="stylesheet" href="assets/css/themes/dark-theme.css" />
  </head>
  <body>
    <!-- Main Container -->
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar Navigation -->
        <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar">
          <div class="sidebar-wrapper">
            <div class="text-center mb-4">
              <h1 class="text-white mt-2">LMS</h1>
            </div>
            <ul class="nav flex-column" id="main-nav">
              <li class="nav-item">
                <a class="nav-link active" href="#" data-page="dashboard">
                  <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" data-page="students">
                  <i class="bi bi-people me-2"></i>Students
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" data-page="courses">
                  <i class="bi bi-book me-2"></i>Courses
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" data-page="grades">
                  <i class="bi bi-trophy me-2"></i>Grades
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" data-page="settings">
                  <i class="bi bi-gear me-2"></i>Settings
                </a>
              </li>
            </ul>

            <!-- Instructor Profile Section -->
            <div class="instructor-profile-sidebar">
              <div class="d-flex align-items-center">
                <img
                  src="https://via.placeholder.com/50"
                  alt="Profile"
                  class="profile-thumbnail rounded-circle me-2"
                  id="sidebar-profile-img"
                />
                <div class="profile-info">
                  <h6 class="text-white mb-0" id="sidebar-profile-name">
                    Tebarek Instructor
                  </h6>
                  <small class="text-secondary" id="sidebar-profile-email"
                    >tebarek@lms.com</small
                  >
                  <p
                    class="text-secondary small mb-0 mt-1"
                    id="sidebar-profile-bio"
                  >
                    <i class="bi bi-chat-quote"></i> Passionate educator
                  </p>
                </div>
              </div>
            </div>
          </div>
        </nav>

        <!-- Main Content Area -->
        <main
          class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content"
          id="main-content"
        >
          <!-- Pages will be loaded here dynamically -->
        </main>
      </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="gradeModal" tabindex="-1">
      <!-- Grade modal content -->
    </div>

    <div class="modal fade" id="addCourseModal" tabindex="-1">
      <!-- Add course modal content -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modular JavaScript -->
    <script src="assets/js/utils/constants.js"></script>
    <script src="assets/js/utils/helpers.js"></script>
    <script src="assets/js/data/sample-data.js"></script>
    <script src="assets/js/components/notifications.js"></script>
    <script src="assets/js/core/router.js"></script>
    <script src="assets/js/modules/dashboard.js"></script>
    <script src="assets/js/modules/students.js"></script>
    <script src="assets/js/modules/courses.js"></script>
    <script src="assets/js/modules/grades.js"></script>
    <script src="assets/js/modules/settings.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
